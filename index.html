<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noor AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
</head>
<body class="state-idle">

<!-- FULLSCREEN FACE VIEW -->
<div id="face-screen">
  <div id="face-bg-glow"></div>

  <div id="top-bar">
    <div id="logo">noor<span class="logo-dot">.ai</span></div>
    <div id="status-chip"><span id="status-dot">●</span> <span id="status-text">IDLE</span></div>
  </div>

  <!-- NOOR FACE -->
  <div id="face-wrap">
    <div id="face-container">
      <div id="brows-row">
        <div class="brow" id="brow-l"></div>
        <div class="brow" id="brow-r"></div>
      </div>
      <div id="eyes-row">
        <div class="eye" id="eye-l">
          <div class="eye-shine"></div>
        </div>
        <div class="eye" id="eye-r">
          <div class="eye-shine"></div>
        </div>
      </div>
      <div id="mouth"></div>
      <div id="think-dots">
        <span></span><span></span><span></span>
      </div>
      <!-- blush cheeks for happy -->
      <div id="blush-left" class="blush"></div>
      <div id="blush-right" class="blush"></div>
    </div>
    <!-- speech bubble -->
    <div id="speech-bubble" class="hidden">
      <div id="bubble-label">NOOR</div>
      <div id="bubble-text"></div>
    </div>
  </div>

  <!-- MIC BUTTON BOTTOM CENTER -->
  <div id="bottom-bar">
    <button id="mic-btn" title="Talk to Noor">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <div id="input-row">
      <input type="text" id="text-input" placeholder="ask noor anything..." />
      <button id="send-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- CORNER ICON BUTTONS -->
  <button id="chat-toggle-btn" title="Open chat history">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>

  <button id="qa-toggle-btn" title="Quick Q&A panel">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
  </button>

  <button id="reminders-btn" title="Daily Reminders">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
    </svg>
  </button>

  <button id="settings-btn" title="Settings">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
</div>

<!-- CHAT HISTORY PANEL (slides in) -->
<div id="chat-panel" class="panel hidden">
  <div class="panel-header">
    <span>// chat history</span>
    <button class="close-btn" id="chat-close">✕</button>
  </div>
  <div id="chat-messages"></div>
</div>

<!-- Q&A PANEL (slides in) -->
<div id="qa-panel" class="panel hidden">
  <div class="panel-header">
    <span>// quick asks</span>
    <button class="close-btn" id="qa-close">✕</button>
  </div>
  <div id="qa-list">
    <!-- Quick buttons populated from JS -->
  </div>

  <div class="panel-header" style="margin-top:16px">
    <span>// daily reminders</span>
  </div>
  <div id="reminders-list-compact">
    <!-- Reminders will be shown here -->
  </div>

  <div class="panel-header" style="margin-top:16px">
    <span>// custom Q&A</span>
  </div>
  <div id="custom-qa-list"></div>
  <div id="add-qa-form">
    <input type="text" id="qa-question" placeholder="your question..." />
    <input type="text" id="qa-answer" placeholder="noor's answer..." />
    <button id="add-qa-btn">+ add Q&A</button>
  </div>
</div>

<!-- REMINDERS PANEL REMOVED -->

<!-- SETTINGS PANEL -->
<div id="settings-panel" class="panel hidden">
  <div class="panel-header">
    <span>// settings</span>
    <button class="close-btn" id="settings-close">✕</button>
  </div>
  <div class="setting-group">
    <label>Groq API Key</label>
    <input type="password" id="api-key-input" placeholder="gsk_..." />
    <button id="save-key-btn">save key</button>
  </div>
  <div class="setting-group">
    <label>Voice Speed</label>
    <input type="range" id="voice-speed" min="0.5" max="1.5" step="0.1" value="1.1" />
    <span id="voice-speed-val">1.1x</span>
  </div>
  <div class="setting-group">
    <label>Voice Pitch</label>
    <input type="range" id="voice-pitch" min="1" max="2" step="0.1" value="1.6" />
    <span id="voice-pitch-val">1.6</span>
  </div>
  <p class="setting-note">get a free key at <a href="https://console.groq.com" target="_blank">console.groq.com</a></p>
</div>

<!-- OVERLAY -->
<div id="overlay" class="hidden"></div>

<script type="module" src="app.js"></script>
</body>
</html>
